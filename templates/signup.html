{% extends "base.html" %}

{% block content %}
<main class="auth-wrapper container">
    <div class="glass-panel auth-card">
        <h1 class="auth-title">Create an Account</h1>
        <p class="auth-subtitle">Start tracking your user drop-offs today.</p>
        
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6">
            </div>
            
            <button type="submit" class="btn-primary mt-4">Sign Up</button>
            <p class="text-center text-sm text-muted mt-4">
                Already have an account? <a href="{{ url_for('login') }}">Log in here</a>.
            </p>
        </form>
    </div>
</main>
{% endblock %}
