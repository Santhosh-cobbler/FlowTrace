{% extends "base.html" %}

{% block content %}
<main class="auth-wrapper container">
    <div class="glass-panel auth-card">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Log in to view your funnel analytics.</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-primary mt-4">Log In</button>
            <p class="text-center text-sm text-muted mt-4">
                Don't have an account? <a href="{{ url_for('signup') }}">Sign up here</a>.
            </p>
        </form>
    </div>
</main>
{% endblock %}
